<svg viewBox="0 0 200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bloom bottle">
  <defs>
    <linearGradient id="glass-bloom" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EFB2C2" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#EFB2C2" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#DD8AA2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DD8AA2" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="cap-bloom" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a35a4e"/>
      <stop offset="50%" stop-color="#C97C6E"/>
      <stop offset="100%" stop-color="#a35a4e"/>
    </linearGradient>
    <linearGradient id="sheen-bloom" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="18%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="26%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- cap -->
  <rect x="82" y="18" width="36" height="34" rx="3" fill="url(#cap-bloom)"/>
  <rect x="82" y="48" width="36" height="6" fill="#a35a4e"/>
  <!-- neck -->
  <rect x="88" y="54" width="24" height="46" fill="url(#glass-bloom)"/>
  <!-- shoulder -->
  <path d="M88,100 C88,120 60,130 50,150 L150,150 C140,130 112,120 112,100 Z" fill="url(#glass-bloom)"/>
  <!-- upper body (label area) -->
  <rect x="42" y="150" width="116" height="150" fill="url(#glass-bloom)"/>
  <!-- lower faceted crystal body -->
  <path d="M40,300 L160,300 L160,440 C160,460 145,460 138,460 L62,460 C55,460 40,460 40,440 Z" fill="url(#glass-bloom)"/>
  <g clip-path="url(#clip-bloom)">
    <line x1="40.0" y1="300" x2="34.0" y2="460" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<line x1="57.1" y1="300" x2="51.1" y2="460" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<line x1="74.3" y1="300" x2="68.3" y2="460" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<line x1="91.4" y1="300" x2="85.4" y2="460" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<line x1="108.6" y1="300" x2="102.6" y2="460" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<line x1="125.7" y1="300" x2="119.7" y2="460" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<line x1="142.9" y1="300" x2="136.9" y2="460" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<line x1="160.0" y1="300" x2="154.0" y2="460" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<line x1="40.0" y1="330" x2="154.0" y2="450" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
<line x1="57.1" y1="330" x2="136.9" y2="450" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
<line x1="74.3" y1="330" x2="119.7" y2="450" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
<line x1="91.4" y1="330" x2="102.6" y2="450" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
<line x1="108.6" y1="330" x2="85.4" y2="450" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
<line x1="125.7" y1="330" x2="68.3" y2="450" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
<line x1="142.9" y1="330" x2="51.1" y2="450" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  </g>
  <clipPath id="clip-bloom">
    <path d="M40,300 L160,300 L160,440 C160,460 145,460 138,460 L62,460 C55,460 40,460 40,440 Z"/>
  </clipPath>
  <!-- base -->
  <rect x="40" y="455" width="120" height="8" rx="2" fill="#DD8AA2" opacity="0.5"/>

  <!-- label -->
  <rect x="58" y="185" width="84" height="80" fill="#F6F1E4" stroke="#C9BFA8" stroke-width="1"/>
  <circle cx="100" cy="200" r="7" fill="none" stroke="#8a8367" stroke-width="0.8"/>
  <path d="M100,196 q3,4 0,8 q-3,-4 0,-8" fill="#8a8367"/>
  <text x="100" y="228" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="13" letter-spacing="1.5" fill="#2b2a25">VESTA</text>
  <line x1="82" y1="236" x2="118" y2="236" stroke="#8a8367" stroke-width="0.6"/>
  <text x="100" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" letter-spacing="2" fill="#6b6552">GIN</text>
  <text x="66" y="258" font-family="Arial, sans-serif" font-size="5" fill="#8a8367">700 ML</text>
  <text x="118" y="258" text-anchor="end" font-family="Arial, sans-serif" font-size="5" fill="#8a8367">40% VOL</text>

  <!-- glass sheen -->
  <rect x="40" y="100" width="120" height="360" fill="url(#sheen-bloom)"/>
</svg>